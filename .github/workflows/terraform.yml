# ==============================================================================
# Terraform CI/CD Pipeline
# ==============================================================================
# Automated infrastructure validation and deployment pipeline.
# - On Pull Request: Format check → Validate → Plan (commented on PR)
# - On merge to main: Apply to dev environment
# ==============================================================================

name: "Terraform CI/CD"

on:
  push:
    branches: [main]
    paths:
      - "modules/**"
      - "environments/**"
      - ".github/workflows/terraform.yml"
  pull_request:
    branches: [main]
    paths:
      - "modules/**"
      - "environments/**"
      - ".github/workflows/terraform.yml"

permissions:
  contents: read
  pull-requests: write
  id-token: write  # Required for OIDC authentication

env:
  TF_VERSION: "1.5.7"
  AWS_REGION: "us-east-1"

jobs:
  # ===========================================================================
  # Job 1: Format Check (runs on all environments in parallel)
  # ===========================================================================
  format:
    name: "Terraform Format"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        run: terraform fmt -check -recursive -diff

  # ===========================================================================
  # Job 2: Validate all environments
  # ===========================================================================
  validate:
    name: "Validate ${{ matrix.environment }}"
    runs-on: ubuntu-latest
    needs: format

    strategy:
      fail-fast: false
      matrix:
        environment: [dev, staging, prod]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: environments/${{ matrix.environment }}
        run: terraform init -backend=false

      - name: Terraform Validate
        working-directory: environments/${{ matrix.environment }}
        run: terraform validate

  # ===========================================================================
  # Job 3: Plan (on Pull Requests only)
  # Requires AWS_ROLE_ARN secret + GitHub OIDC role configured in IAM.
  # Uncomment this job once AWS credentials are set up.
  # ===========================================================================
  # plan:
